<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="header">

<a href="wallet.html">
<i class="fa-solid fa-arrow-left"></i>
</a>

<h2>Deposit</h2>

</div>

<div class="deposit-card">

<h3>USDT (SOL)</h3>

<p>Minimum Deposit: <b>$5</b></p>

<img src="images/sol-qr.png" class="qr">

<p class="address" id="walletAddress">
YOUR_SOL_WALLET_ADDRESS
</p>

<button onclick="copyAddress()" class="main-btn">
Copy Wallet Address
</button>

</div>

<div class="deposit-form">

<input
type="number"
id="depositAmount"
placeholder="Deposit Amount">

<button
class="main-btn"
onclick="submitDeposit()">

I Have Paid

</button>

</div>

</div>

<script src="js/script.js"></script>

</body>
                      </html>
